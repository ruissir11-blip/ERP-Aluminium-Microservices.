name: CD Pipeline

on:
  workflow_run:
    workflows: [CI Pipeline]
    types: [completed]
    branches: [main, develop]

env:
  NODE_VERSION: '20'
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success' && github.ref == 'refs/heads/develop'
    environment: staging
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: develop
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Login to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:staging
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:staging-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      
      - name: Deploy to Staging (kubectl)
        uses: azure/k8s-set-context@v1
        with:
          kubeconfig: ${{ secrets.KUBECONFIG_STAGING }}
      
      - name: Deploy to Kubernetes staging
        run: |
          kubectl set image deployment/erp-backend backend=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:staging-${{ github.sha }} -n staging
          kubectl rollout status deployment/erp-backend -n staging --timeout=300s
      
      - name: Run smoke tests
        run: |
          sleep 30
          curl -f https://staging-api.erp-aluminium.com/health || exit 1

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success' && github.ref == 'refs/heads/main'
    environment: production
    needs: deploy-staging
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: main
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Login to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:prod-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      
      - name: Create deployment backup
        run: |
          kubectl get deployment erp-backend -n production -o yaml > backup-deployment-${{ github.sha }}.yaml
      
      - name: Deploy to Kubernetes production (blue-green)
        run: |
          # Update deployment image
          kubectl set image deployment/erp-backend backend=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:prod-${{ github.sha }} -n production
          
          # Wait for rollout
          kubectl rollout status deployment/erp-backend -n production --timeout=600s
      
      - name: Run health check
        run: |
          sleep 30
          curl -f https://api.erp-aluminium.com/health || exit 1
      
      - name: Notify deployment
        if: always()
        uses: slackapi/slack-github-action@v1.24
        with:
          payload: |
            {
              "text": "Deployment ${{ job.status }}",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*ERP Aluminium Deployment* ${{ job.status }}"
                  }
                },
                {
                  "type": "section",
                  "fields": [
                    {
                      "type": "mrkdwn",
                      "text": "*Environment:*\nProduction"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Commit:*\n${{ github.sha }}"
                    }
                  ]
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

  rollback-production:
    name: Rollback Production
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'failure' && github.ref == 'refs/heads/main'
    environment: production
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Get previous stable image
        run: |
          PREVIOUS_IMAGE=$(git rev-parse HEAD~1)
          echo "Rolling back to: $PREVIOUS_IMAGE"
      
      - name: Set up kubectl
        uses: azure/k8s-set-context@v1
        with:
          kubeconfig: ${{ secrets.KUBECONFIG_PRODUCTION }}
      
      - name: Rollback deployment
        run: |
          kubectl rollout undo deployment/erp-backend -n production
          kubectl rollout status deployment/erp-backend -n production --timeout=300s
      
      - name: Notify rollback
        uses: slackapi/slack-github-action@v1.24
        with:
          payload: |
            {
              "text": "Production rolled back due to failed deployment"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
