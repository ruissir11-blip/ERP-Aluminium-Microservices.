# Default values for erp-aluminium
# This is a YAML-formatted file.

replicaCount: 3

image:
  repository: ghcr.io/your-org/erp-aluminium-backend
  pullPolicy: IfNotPresent
  tag: "latest"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "3000"
  prometheus.io/path: "/metrics"

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000

securityContext:
  capabilities:
    drop:
    - ALL
  readOnlyRootFilesystem: false
  allowPrivilegeEscalation: false

service:
  type: ClusterIP
  port: 80
  targetPort: 3000

ingress:
  enabled: true
  className: "nginx"
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
  hosts:
    - host: api.erp-aluminium.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: erp-tls
      hosts:
        - api.erp-aluminium.com

resources:
  limits:
    cpu: 1000m
    memory: 1Gi
  requests:
    cpu: 250m
    memory: 512Mi

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

nodeSelector: {}

tolerations: []

affinity: {}

# Environment variables
env:
  - name: NODE_ENV
    value: "production"
  - name: DATABASE_URL
    valueFrom:
      secretKeyRef:
        name: erp-secrets
        key: database-url
  - name: JWT_SECRET
    valueFrom:
      secretKeyRef:
        name: erp-secrets
        key: jwt-secret

# PostgreSQL dependency
postgresql:
  enabled: false
  # Set to true if you want to include PostgreSQL
  auth:
    username: postgres
    password: changeme

# Redis dependency  
redis:
  enabled: false
  # Set to true if you want to include Redis

# Monitoring
prometheus:
  enabled: true
  serviceMonitor:
    enabled: true
    interval: 30s
