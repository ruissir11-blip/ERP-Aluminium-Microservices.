apiVersion: apps/v1
kind: Deployment
metadata:
  name: erp-backend
  namespace: production
  labels:
    app: erp-backend
    tier: backend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: erp-backend
  template:
    metadata:
      labels:
        app: erp-backend
        tier: backend
    spec:
      containers:
      - name: backend
        image: ghcr.io/your-org/erp-aluminium-backend:latest
        ports:
        - containerPort: 3000
          name: http
        env:
        - name: NODE_ENV
          value: "production"
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: erp-secrets
              key: database-url
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: erp-secrets
              key: jwt-secret
        - name: REDIS_URL
          value: "redis://erp-redis:6379/0"
        - name: AI_SERVICE_URL
          value: "http://erp-ai-service:5000"
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: erp-backend
  namespace: production
spec:
  selector:
    app: erp-backend
  ports:
  - port: 80
    targetPort: 3000
    name: http
  type: ClusterIP
