apiVersion: v1
kind: Secret
metadata:
  name: erp-secrets
  namespace: production
type: Opaque
stringData:
  database-url: "postgresql://user:password@postgres:5432/erp_aluminium"
  jwt-secret: "your-256-bit-secret-key-change-in-production"
  redis-password: ""
  smtp-password: ""
  encryption-key: "your-256-bit-encryption-key"
---
apiVersion: v1
kind: Secret
metadata:
  name: erp-tls
  namespace: production
type: kubernetes.io/tls
stringData:
  tls.crt: |
    # Paste your TLS certificate here
  tls.key: |
    # Paste your TLS private key here
