# ============================================================
#  ERP RH Microservice - Docker Compose Snippet
# ============================================================
# Add this service to your existing docker-compose.yml

  # ──────────────────────────────────────────────────────────
  #  ERP RH SERVICE — Microservice RH (Node.js:5001)
  #  Données isolées dans le schema 'rh_schema'
  # ──────────────────────────────────────────────────────────
  erp-rh-service:
    build:
      context: ./microservice-rh
      dockerfile: docker/Dockerfile
      target: production
    container_name: erp-rh-service
    ports:
      - "5001:5001"
    volumes:
      - ./microservice-rh/src:/app/src
      - /app/node_modules
    env_file:
      - ./microservice-rh/.env
    environment:
      - NODE_ENV=development
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - DB_NAME=erp_aluminium
      - DB_SCHEMA=rh_schema
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - erp-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:5001/api/v1/hr/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s